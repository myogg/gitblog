<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}姜小小{% endblock %}</title>
    <meta name="description" content="{% block description %}姜小小 - 记录技术、生活和思考。探索编程、人工智能、个人成长等话题。{% endblock %}">
    <meta name="keywords" content="{% block keywords %}博客,技术博客,编程,AI,个人成长{% endblock %}">
    <meta name="author" content="姜小小">

    <meta property="og:title" content="姜小小">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://134688.xyz/">
    <meta property="og:description" content="姜小小 - 记录技术、生活和思考。探索编程、人工智能、个人成长等话题。">
    <meta property="og:site_name" content="姜小小">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% if base_path %}{{base_path}}{% endif %}static/style.css">

    {% block head_extra %}{% endblock %}

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "姜小小",
        "description": "记录技术、生活和思考。探索编程、人工智能、个人成长等话题。",
        "url": "https://134688.xyz",
        "inLanguage": "zh-CN",
        "author": {
            "@type": "Person",
            "name": "姜小小",
            "url": "https://134688.xyz/about.html",
            "sameAs": [
                "https://github.com/myogg",
                "mailto:xxjss@hotmail.com"
            ]
        }
    }
    </script>
    <script>
        // 暗色模式初始化
        if (localStorage.getItem("theme") == null) {
            localStorage.setItem("theme", "light");
        }
        if (localStorage.getItem("theme") == "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        } else {
            document.documentElement.setAttribute("data-theme", "light");
        }
    </script>
</head>
<body data-theme="light">
    <div class="surface-content">
        <header class="site-header">
            <div class="header-content">
                <h1 class="site-logo">
                    <a href="{% if base_path %}{{base_path}}{% endif %}index.html">姜小小</a>
                </h1>
                <p class="site-description">记录技术、生活和思考</p>
                <div class="header-links">
                    <a href="mailto:xxjss@hotmail.com" title="Email">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </a>
                    <a href="https://github.com/myogg" target="_blank" title="GitHub">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    </a>
                    <a href="https://134688.xyz/feed.xml" target="_blank" title="RSS Feed">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle></svg>
                    </a>
                </div>
                <form class="search-form" action="{% if base_path %}{{base_path}}{% endif %}search.html" method="get">
                    <input type="search" class="search-field" placeholder="搜索..." name="q">
                </form>
                <div class="header-right">
                    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        <nav class="pNav">
            <a href="{% if base_path %}{{base_path}}{% endif %}index.html">Home</a>
            <a href="{% if base_path %}{{base_path}}{% endif %}about.html">About</a>
        </nav>


        <main class="container">
            {% block content %}
            {% endblock %}
        </main>

        <footer class="site-footer">
            <div class="footer-logo">姜小小</div>
            <div class="footer-copyright">&copy; 2026 姜小小 &amp; Theme myogg</div>
        </footer>
    </div>

    <button class="back-to-top" id="backToTop" aria-label="返回顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script src="{% if base_path %}{{base_path}}{% endif %}static/script.js"></script>
</body>
</html>
